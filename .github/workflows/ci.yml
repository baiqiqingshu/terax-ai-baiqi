name: CI / Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit (advisory)
        run: pnpm audit --prod --audit-level high
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: React Compiler healthcheck (advisory)
        run: pnpm exec react-compiler-healthcheck
        continue-on-error: true

      - name: Build frontend
        run: pnpm build

      - name: Size budget
        run: pnpm size

      - name: Dead code (advisory)
        run: pnpm knip
        continue-on-error: true

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-machete

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Unused crates (advisory)
        working-directory: src-tauri
        run: cargo machete
        continue-on-error: true

      - name: cargo nextest
        working-directory: src-tauri
        run: cargo nextest run

  rust-platforms:
    name: rust-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo nextest
        working-directory: src-tauri
        run: cargo nextest run --retries 2

  coverage:
    runs-on: ubuntu-22.04
    needs: rust
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: coverage

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate coverage
        working-directory: src-tauri
        run: cargo llvm-cov nextest --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov-report
          path: src-tauri/lcov.info
          if-no-files-found: error
  publish-tauri:
    name: release (${{ matrix.platform }})
    needs: [frontend, rust, rust-platforms, coverage]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            zip

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Rust lockfile
        working-directory: src-tauri
        run: cargo generate-lockfile

      - name: Commit lockfiles if changed
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- pnpm-lock.yaml src-tauri/Cargo.lock; then
            echo "Lockfiles unchanged, skipping commit."
          else
            git add pnpm-lock.yaml src-tauri/Cargo.lock
            git commit -m "chore: update dependency lockfiles [skip ci]"
            git push origin HEAD:main
            echo "Lockfiles committed and pushed."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test Windows executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          pnpm tauri build --bundles none
          $exe = 'src-tauri/target/release/aterax.exe'
          Get-Item -LiteralPath $exe -ErrorAction Stop | Out-Null
          $panicLog = Join-Path $env:LOCALAPPDATA 'app.crynta.aterax\logs\startup-panic.log'
          Remove-Item -LiteralPath $panicLog -Force -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath $exe -ArgumentList (Get-Location).Path -PassThru
          Start-Sleep -Seconds 5
          Get-Process -Id $process.Id -ErrorAction Stop | Out-Null
          Stop-Process -Id $process.Id -Force
          if (Test-Path $panicLog) { throw (Get-Content -Raw $panicLog) }

      - id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Terax ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install. Auto-update is built in."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ============================================================
      # 绿色版 ZIP 打包 - Windows (单个 exe)
      # ============================================================
      - name: Package portable ZIP (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/aterax.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Binary not found: $exe"
            exit 1
          }
          $zipName = "Aterax-${{ github.ref_name }}-portable-windows-x64.zip"
          Compress-Archive -Path $exe -DestinationPath $zipName -Force
          Write-Host "Created: $zipName ($((Get-Item $zipName).Length / 1MB) MB)"

      - name: Upload portable ZIP (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "Aterax-${{ github.ref_name }}-portable-windows-x64.zip" \
            --clobber --repo "${{ github.repository }}"

      # ============================================================
      # 绿色版 ZIP 打包 - Linux (AppImage 单文件)
      # ============================================================

      # Strip the bundled libwayland-* libs from the AppImage so it loads the
      # host copies at runtime. The Ubuntu 22.04 build host ships libwayland
      # 1.20, but recent Mesa (Fedora 43 / Arch / Bazzite, Mesa 1.22+) needs
      # newer symbols; AppImage puts its bundled libs first on the search path,
      # so the stale copy wins and EGL fails with EGL_BAD_PARAMETER.
      - name: Fix AppImage wayland libs and re-sign
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)
          BASENAME=$(basename "$APPIMAGE")
          echo "Patching: $APPIMAGE"

          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/"
          pushd "$WORK" >/dev/null
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null

          # Fail loud if Tauri/linuxdeploy stops bundling these, so a future
          # layout change cannot silently ship an unfixed AppImage.
          for lib in libwayland-client.so.0 libwayland-egl.so.1 libwayland-cursor.so.0; do
            test -e "squashfs-root/usr/lib/$lib" \
              || { echo "expected bundled lib missing: $lib (layout changed?)"; exit 1; }
          done

          rm -f squashfs-root/usr/lib/libwayland-client.so.0 \
                squashfs-root/usr/lib/libwayland-egl.so.1 \
                squashfs-root/usr/lib/libwayland-cursor.so.0 \
                squashfs-root/usr/lib/libwayland-server.so.0

          curl -fsSL -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run squashfs-root "$BASENAME"

          # Sanity-check the repacked image before it replaces the original.
          rm -rf squashfs-root
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null
          for lib in libwayland-client.so.0 libwayland-egl.so.1 libwayland-cursor.so.0; do
            test ! -e "squashfs-root/usr/lib/$lib" \
              || { echo "lib still present after repack: $lib"; exit 1; }
          done
          test -x squashfs-root/usr/bin/terax \
            || { echo "terax binary missing from repacked AppImage"; exit 1; }
          popd >/dev/null

          cp "$WORK/$BASENAME" "$APPIMAGE"

          rm -f "$APPIMAGE.sig"
          pnpm tauri signer sign "$APPIMAGE"

          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" "$APPIMAGE" "$APPIMAGE.sig" \
            --clobber --repo "$GITHUB_REPOSITORY"

      - name: Package portable ZIP (Linux)
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)
          ZIP_NAME="Aterax-${{ github.ref_name }}-portable-linux-x64.zip"
          zip -j "$ZIP_NAME" "$APPIMAGE"
          echo "Created: $ZIP_NAME ($(du -h "$ZIP_NAME" | cut -f1))"

      - name: Upload portable ZIP (Linux)
        if: matrix.platform == 'ubuntu-22.04' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "Aterax-${{ github.ref_name }}-portable-linux-x64.zip" \
            --clobber --repo "${{ github.repository }}"

  # Patch the AppImage signature into the combined updater manifest. Runs once,
  # after every matrix leg has finished merging its platform into latest.json,
  # so it operates on the full manifest and cannot be clobbered by a parallel
  # macOS/Windows upload. Both linux keys point at the AppImage and both carry
  # a signature, so both are patched.
  patch-appimage-updater:
    needs: publish-tauri
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Patch latest.json with re-signed AppImage signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "latest.json" --pattern "*_amd64.AppImage.sig" --clobber

          SIG_FILE=$(ls ./*_amd64.AppImage.sig | head -n1)
          NEW_SIG=$(cat "$SIG_FILE")

          jq -e 'has("platforms") and (.platforms | has("linux-x86_64"))' latest.json >/dev/null \
            || { echo "latest.json missing platforms.linux-x86_64"; exit 1; }

          jq --arg sig "$NEW_SIG" '
            .platforms["linux-x86_64"].signature = $sig
            | if .platforms["linux-x86_64-appimage"]
              then .platforms["linux-x86_64-appimage"].signature = $sig else . end
          ' latest.json > latest.json.tmp
          mv latest.json.tmp latest.json

          gh release upload "$TAG" latest.json --clobber --repo "$GITHUB_REPOSITORY"
